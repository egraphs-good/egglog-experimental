[package]
name = "egglog-experimental"
version = "0.1.0"
edition = "2024"

[[test]]
harness = false
name = "files"

[features]
default = ["bin"]
bin = ["egglog/bin"]

[dependencies]
egglog = { path = "../egglog", default-features = false }
egglog-ast = { path = "../egglog/egglog-ast", default-features = false }
egglog-reports = { path = "../egglog/egglog-reports", default-features = false }

num = "0.4.3"
lazy_static = "1.4"
log = "0.4"

[dev-dependencies]
glob = "0.3.1"
libtest-mimic = "0.8.1"
